<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Profile page -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Mental Wellness Check</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="profile-bg">

<nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
        <a class="navbar-brand" href="dashboard.html"><i class="fas fa-heartbeat"></i> MWC System</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="mood_history.html"><i class="fas fa-chart-line"></i> Mood History</a></li>
                <li class="nav-item"><a class="nav-link" href="activity_history.html"><i class="fas fa-list"></i> Activity History</a></li>
                <li class="nav-item"><a class="nav-link active" aria-current="page" href="profile.html"><i class="fas fa-user"></i> Profile</a></li>
            </ul>
            <span class="navbar-text me-3">
                Hello, <strong id="username">User</strong>
            </span>
            <a href="login.html" class="btn btn-outline-secondary btn-sm"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>
</nav>

<div class="container d-flex justify-content-center py-4">
    <div class="card p-4 shadow-sm fade-in" style="max-width: 500px; width:100%;">
        <h4 class="text-center mb-3"><i class="fas fa-user-edit"></i> Profile</h4>
        <form id="profileForm" novalidate>
            <div class="mb-3">
                <label for="profileName" class="form-label"><i class="fas fa-user"></i> Name</label>
                <input type="text" class="form-control" id="profileName" value="" required>
                <div class="invalid-feedback">Name is required.</div>
            </div>
            <div class="mb-3">
                <label for="profileEmail" class="form-label"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" class="form-control" id="profileEmail" value="" required>
                <div class="invalid-feedback">Valid email required.</div>
            </div>
            <div class="mb-3">
                <label for="profileDept" class="form-label"><i class="fas fa-building"></i> Department</label>
                <input type="text" class="form-control" id="profileDept" value="" required>
                <div class="invalid-feedback">Department is required.</div>
            </div>
            <button type="submit" class="btn btn-soft w-100"><i class="fas fa-save"></i> Save</button>
        </form>
    </div>
</div>

<footer>
    <p><i class="fas fa-copyright"></i> 2026 Mental Wellness Check System</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
