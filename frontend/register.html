<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Registration page for Mental Wellness Check System -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Mental Wellness Check</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="register-bg">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow-sm fade-in" style="max-width: 500px; width:100%;">
        <h3 class="text-center mb-3"><i class="fas fa-user-plus"></i> Register</h3>
        <div id="registerMessage" class="alert alert-success d-none"></div>
        <form id="registerForm" novalidate>
            <div class="mb-3">
                <label for="regName" class="form-label"><i class="fas fa-user"></i> Name</label>
                <input type="text" class="form-control" id="regName" placeholder="Your full name" required>
                <div class="invalid-feedback">
                    Name is required.
                </div>
            </div>
            <div class="mb-3">
                <label for="regEmail" class="form-label"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" class="form-control" id="regEmail" placeholder="Enter email" required>
                <div class="invalid-feedback">
                    Please provide a valid email.
                </div>
            </div>
            <div class="mb-3">
                <label for="regPassword" class="form-label"><i class="fas fa-lock"></i> Password</label>
                <input type="password" class="form-control" id="regPassword" placeholder="Min 6 characters" required>
                <div class="invalid-feedback">
                    Password must be at least 6 characters long.
                </div>
            </div>
            <div class="mb-3">
                <label for="regDept" class="form-label"><i class="fas fa-building"></i> Department</label>
                <input type="text" class="form-control" id="regDept" placeholder="Your department" required>
                <div class="invalid-feedback">
                    Department is required.
                </div>
            </div>
            <button type="submit" class="btn btn-soft w-100"><i class="fas fa-check"></i> Register</button>
        </form>
        <p class="mt-3 text-center">
            Already have an account? <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login here</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
