<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Login page for Mental Wellness Check System -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mental Wellness Check</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-bg">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <!-- card to center login form -->
    <div class="card p-4 shadow-sm fade-in" style="max-width: 400px; width:100%;">
        <h3 class="text-center mb-3"><i class="fas fa-sign-in-alt"></i> Login</h3>
        <!-- error message placeholder -->
        <div id="loginError" class="alert alert-danger d-none"></div>
        <form id="loginForm" novalidate>
            <div class="mb-3">
                <label for="loginEmail" class="form-label"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" class="form-control" id="loginEmail" placeholder="Enter email" required>
                <div class="invalid-feedback">
                    Please enter a valid email.
                </div>
            </div>
            <div class="mb-3">
                <label for="loginPassword" class="form-label"><i class="fas fa-lock"></i> Password</label>
                <input type="password" class="form-control" id="loginPassword" placeholder="Password" required>
                <div class="invalid-feedback">
                    Password is required.
                </div>
            </div>
            <button type="submit" class="btn btn-soft w-100"><i class="fas fa-arrow-right"></i> Login</button>
        </form>
        <p class="mt-3 text-center">
            Don't have an account? <a href="register.html"><i class="fas fa-user-plus"></i> Register here</a>
        </p>
    </div>
</div>

<!-- Bootstrap JS and custom script -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
